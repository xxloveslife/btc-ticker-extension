<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="toprow">
      <div class="symbar" id="symbar"></div>
      <div class="status">
        <span class="perp">永续</span><span id="dot" class="dot"></span><span id="src" class="src"></span>
        <button id="detach" class="detach" title="在独立窗口中打开(可拖到其他显示器)">⧉</button>
      </div>
    </div>
    <div class="manage" id="manage" hidden>
      <div class="addrow">
        <input id="symInput" placeholder="输入代码,如 DOGE 或 DOGEUSDT" maxlength="20" autocomplete="off" />
        <button id="addBtn">添加</button>
      </div>
      <div class="addmsg" id="addMsg"></div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="price" id="price">--</div>
    <div class="change" id="change">--</div>
  </div>

  <div class="tf" id="tf">
    <button data-tf="5m" class="active">5m</button>
    <button data-tf="15m">15m</button>
    <button data-tf="1h">1h</button>
    <button data-tf="4h">4h</button>
    <button data-tf="1d">1d</button>
  </div>

  <div class="chartwrap">
    <div id="chart"></div>
    <div class="legend">EMA20</div>
    <div class="ccd" id="ccd"></div>
    <div class="chart-msg" id="chartMsg"></div>
  </div>

  <div class="stats">
    <div class="stat"><span class="k">资金费率</span><span class="v" id="funding">--</span></div>
    <div class="stat"><span class="k">结算</span><span class="v" id="countdown">--</span></div>
    <div class="stat"><span class="k">24h 高</span><span class="v" id="high">--</span></div>
    <div class="stat"><span class="k">24h 低</span><span class="v" id="low">--</span></div>
  </div>

  <script src="vendor/lightweight-charts.standalone.production.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
